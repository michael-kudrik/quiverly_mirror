# This file configures a Docker container for MariaDB 11.8 (LTS).
# Designed for local development with persistent storage.

version: '3.8'

services:
  db:
    image: mariadb:11.8
    container_name: mariadb_dev_db
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: surfallday
      MARIADB_DATABASE: surfdb
      MARIADB_USER: surfuser
      MARIADB_PASSWORD: surfpass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
