# This file configures a Docker container for MySQL 8.4 (LTS).
# It's designed for local development, ensuring data persists across restarts.

version: '3.8'

services:
  # Defines the MySQL service
  db:
    image: mysql:8.4
    container_name: mysql_dev_db
    restart: always
    # Set environment variables for MySQL configuration.
    # IMPORTANT: Change these default passwords for any real application.
    environment:
      MYSQL_ROOT_PASSWORD: surfallday
      MYSQL_DATABASE: surfdb
      MYSQL_USER: surfuser
      MYSQL_PASSWORD: surfpass
    ports:
      # Exposes the MySQL port to your host machine.
      # Format: "HOST_PORT:CONTAINER_PORT"
      - "3306:3306"
    volumes:
      # This named volume will store the MySQL data persistently.
      - db_data:/var/lib/mysql
    # Optional: Add command to use native password authentication for better compatibility
    # with older clients if needed. For modern clients, this isn't necessary.
    # command: --default-authentication-plugin=mysql_native_password

# Defines the named volume for data persistence.
volumes:
  db_data:
