spring.application.name=backend
spring.datasource.url=jdbc:mariadb://localhost:3306/surfdb
spring.datasource.username=surfuser
spring.datasource.password=surfpass
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
jwt.secret=${JWT_SECRET:quiverly_super_secret_key_for_local_development_needs_to_be_long_enough}
jwt.expiration=3600000
app.uploads=${UPLOAD_DIR:uploads}